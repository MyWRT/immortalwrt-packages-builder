name: ImmortalWrt Packages Build Bot
on:
  push:
    branches: 
      - main
    paths:
      # - '.github/workflows/build-packages-release.yml'
      - 'patch.sh'
      - 'do_not_build'
      - 'packages/**'
      - '!packages/**/github/workflows/**'
      - '!packages/**/README*'
      - '!packages/**/.gitignore'
      - '!packages/**/LICENSE'
      - '!packages/**/LICENSES'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Packages for ImmortalWRT ${{ matrix.version }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64_generic
        version:
          - "25.12"
          - "24.10"
    env:
      SDK_ARCH: ${{ format('{0}-openwrt-{1}', matrix.arch, matrix.version) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare feeds
        run: |
          ./patch.sh "$SDK_ARCH"
          ls packages | sort > package-list.txt
          sort do_not_build -o do_not_build
          comm -23 package-list.txt do_not_build > packages-to-build.txt
          echo "PACKAGES=$(paste -sd' ' packages-to-build.txt)" >> "$GITHUB_ENV"
          find . -name "Makefile" -type f -exec cat {} \;

      - name: Build
        uses: MyWRT/gh-action-sdk@main
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: ${{ env.SDK_ARCH }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          CCACHE: "1"
          CCACHE_CACHE_PREFIX: ccache-${{ runner.os }}-immortalwrt-${{ env.SDK_ARCH }}
          CCACHE_COMPILERCHECK: content
          CCACHE_MAXSIZE: 2GiB
          INDEX: "1"
          IGNORE_ERRORS: "1"
          BUILD_LOG: "1"
          NO_SHFMT_CHECK: "1"
          NO_REFRESH_CHECK: "1"
          PACKAGES: ${{ env.PACKAGES }}
          FEEDNAME: "mywrt"
          V: "s"

      - name: Report ignored package build errors
        if: always()
        shell: bash
        run: |
          shopt -s globstar nullglob
          error_files=(logs/**/error.txt)

          if (( ${#error_files[@]} == 0 )); then
            echo "No ignored package build errors were recorded."
            exit 0
          fi

          escape_github_command() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "$value"
          }

          {
            echo "### Ignored package build errors"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for file in "${error_files[@]}"; do
            while IFS= read -r line || [[ -n "$line" ]]; do
              [[ -n "$line" ]] || continue

              escaped="$(escape_github_command "$line")"
              printf '::warning::%s\n' "$escaped"
              printf -- '- `%s`: `%s`\n' "$file" "$line" >> "$GITHUB_STEP_SUMMARY"
            done < "$file"
          done

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ env.SDK_ARCH }}
          path: logs
          if-no-files-found: ignore
          retention-days: 7

      # - name: List files
      #   run: |
      #     ls -R bin/

      - name: Stage versioned packages
        run: |
          mkdir artifact-packages
          mv bin/packages "artifact-packages/packages-${{ matrix.version }}"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ env.SDK_ARCH }}
          path: artifact-packages
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true

      - name: Set up Rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Upload Packages to Rclone remote
        run: rclone copy "dist" "remote:ImmortalWRT"

      - name: Upload Packages to GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_PROMPT_DISABLED: "1"
        run: bash .github/workflows/scripts/gh-release.sh
