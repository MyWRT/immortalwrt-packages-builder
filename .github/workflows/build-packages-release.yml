name: ImmortalWrt Packages Build Bot
on:
  push:
    branches: 
      - main
    paths:
      # - '.github/workflows/build-packages-release.yml'
      - 'patch.sh'
      - 'do_not_build'
      - 'packages/**'
      - '!packages/**/github/workflows/**'
      - '!packages/**/README*'
      - '!packages/**/.gitignore'
      - '!packages/**/LICENSE'
      - '!packages/**/LICENSES'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Packages for ImmortalWRT ${{ matrix.version }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64_generic
        version:
          - "25.12"
          - "24.10"
    env:
      SDK_ARCH: ${{ format('{0}-openwrt-{1}', matrix.arch, matrix.version) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare feeds
        id: prepare
        env:
          OPENWRT_VERSION: ${{ matrix.version }}
        run: |
          if [[ "$OPENWRT_VERSION" != "25.12" && "$(printf '%s\n' "$OPENWRT_VERSION" "25.12" | sort -V | head -n 1)" == "$OPENWRT_VERSION" ]]; then
            echo "replace_golang=1" >> "$GITHUB_OUTPUT"
          else
            echo "replace_golang=0" >> "$GITHUB_OUTPUT"
          fi

          ./patch.sh "$SDK_ARCH"
          ls packages | sort > package-list.txt
          sort do_not_build -o do_not_build
          comm -23 package-list.txt do_not_build > packages-to-build.txt
          echo "PACKAGES=$(paste -sd' ' packages-to-build.txt)" >> "$GITHUB_ENV"
          find . -name "Makefile" -type f -exec cat {} \;

      - name: Maximize runner disk space
        uses: justinthelaw/maximize-github-runner-space@v0.9.0
        with:
          cleanup-profile: max
          # The SDK action runs Docker containers, so keep the Docker engine.
          skip-components: docker-engine
          swapfile-size: 2G

      - name: Build
        uses: MyWRT/gh-action-sdk@main
        env:
          CONTAINER: immortalwrt/sdk
          ARCH: ${{ env.SDK_ARCH }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          CCACHE: "1"
          CCACHE_CACHE_PREFIX: ccache-${{ runner.os }}-immortalwrt-${{ env.SDK_ARCH }}
          CCACHE_COMPILERCHECK: content
          CCACHE_MAXSIZE: 2GiB
          SDK_CACHE: "1"
          SDK_CACHE_PREFIX: sdk-cache-${{ runner.os }}-immortalwrt-${{ env.SDK_ARCH }}
          REPLACE_GOLANG: ${{ steps.prepare.outputs.replace_golang }}
          REPLACE_GOLANG_BRANCH: "26.x"
          INDEX: "1"
          IGNORE_ERRORS: "1"
          BUILD_LOG: "1"
          NO_SHFMT_CHECK: "1"
          NO_REFRESH_CHECK: "1"
          PACKAGES: ${{ env.PACKAGES }}
          FEEDNAME: "mywrt"

      - name: Report ignored package build errors
        if: always()
        shell: bash
        run: |
          shopt -s globstar nullglob
          error_files=(logs/**/error.txt)

          if (( ${#error_files[@]} == 0 )); then
            echo "No ignored package build errors were recorded."
            exit 0
          fi

          escape_github_command() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            printf '%s' "$value"
          }

          {
            echo "### Ignored package build errors"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for file in "${error_files[@]}"; do
            while IFS= read -r line || [[ -n "$line" ]]; do
              [[ -n "$line" ]] || continue

              escaped="$(escape_github_command "$line")"
              printf '::warning::%s\n' "$escaped"
              printf -- '- `%s`: `%s`\n' "$file" "$line" >> "$GITHUB_STEP_SUMMARY"
            done < "$file"
          done

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ env.SDK_ARCH }}
          path: logs
          if-no-files-found: ignore
          retention-days: 7

      # - name: List files
      #   run: |
      #     ls -R bin/

      - name: Stage versioned packages
        run: |
          mkdir artifact-packages
          mv bin/packages "artifact-packages/packages-${{ matrix.version }}"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ env.SDK_ARCH }}
          path: artifact-packages
          if-no-files-found: error
          retention-days: 1

  release_r2:
    name: Release to Cloudflare R2
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      actions: read

    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true

      - name: Set up Rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Upload Packages to Cloudflare R2
        run: rclone copy "dist" "r2:mywrt-dist"


